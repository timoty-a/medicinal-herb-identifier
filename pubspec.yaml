name: medicinal_herb_identifier
description: Offline Flutter app for classifying indigenous Nigerian medicinal herbs.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  image: ^4.8.0
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#0D120F"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png

flutter_native_splash:
  color: "#0D120F"
  image: assets/branding/splash_logo.png
  android_12:
    color: "#0D120F"
    image: assets/branding/splash_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/config/labels.txt
    - assets/branding/
    - assets/images/plants/
    - assets/models/plant_classifier.tflite
